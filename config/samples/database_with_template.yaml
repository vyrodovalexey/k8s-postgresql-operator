apiVersion: postgresql-operator.vyrodovalexey.github.com/v1alpha1
kind: Database
metadata:
  labels:
    app.kubernetes.io/name: k8s-postgresql-operator
    app.kubernetes.io/managed-by: kustomize
  name: database-from-template
spec:
  postgresqlID: "test-pg-001"
  database: "testdb_template"
  owner: "testuser"
  schema: "public"
  # Create database from a template database
  dbTemplate: "template0"
  # Delete database from PostgreSQL when CRD is deleted
  deleteFromCRD: true
