apiVersion: postgresql-operator.vyrodovalexey.github.com/v1alpha1
kind: Schema
metadata:
  labels:
    app.kubernetes.io/name: k8s-postgresql-operator
    app.kubernetes.io/managed-by: kustomize
  name: schema-sample
spec:
  # Schema is the name of the PostgreSQL schema to create
  schema: "myschema"

  # Owner is the PostgreSQL user that will own the schema
  # This user must exist in PostgreSQL (can be created via User CRD)
  # Make sure to create the user first using the User CRD before creating the schema
  owner: "myuser"

  # PostgresqlID is the ID of the PostgreSQL instance where this schema should be created
  # This must match the postgresqlID in the Postgresql CRD
  postgresqlID: "test-pg-001"

  # Database is the name of the PostgreSQL database where this schema should be created
  # This database must exist in PostgreSQL (can be created via Database CRD)
  database: "mydatabase"

