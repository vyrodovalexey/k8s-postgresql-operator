apiVersion: postgresql-operator.vyrodovalexey.github.com/v1alpha1
kind: Grant
metadata:
  labels:
    app.kubernetes.io/name: k8s-postgresql-operator
    app.kubernetes.io/managed-by: kustomize
  name: grant-wrong-postgresqlid
spec:
  role: "testreader"
  database: "testdb"
  # Wrong PostgreSQL ID - webhook should reject this resource
  postgresqlID: "wrong-pg-id-does-not-exist"

  grants:
    - type: database
      privileges: [CONNECT]

    - type: schema
      schema: public
      privileges: [USAGE]

    - type: all_tables
      schema: public
      privileges: [SELECT]

    - type: all_sequences
      schema: public
      privileges: [SELECT, USAGE]

  defaultPrivileges:
    - objectType: tables
      schema: public
      privileges: [SELECT]

    - objectType: sequences
      schema: public
      privileges: [SELECT, USAGE]
