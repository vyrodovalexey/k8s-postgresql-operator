apiVersion: postgresql-operator.vyrodovalexey.github.com/v1alpha1
kind: Grant
metadata:
  labels:
    app.kubernetes.io/name: k8s-postgresql-operator
    app.kubernetes.io/managed-by: kustomize
  name: grant-wrong-database
spec:
  role: "testreader"
  # Wrong database name - this database does not exist, webhook should reject
  database: "nonexistent_database"
  postgresqlID: "test-pg-001"

  grants:
    - type: database
      privileges: [CONNECT]

    - type: schema
      schema: public
      privileges: [USAGE]

    - type: all_tables
      schema: public
      privileges: [SELECT]

    - type: all_sequences
      schema: public
      privileges: [SELECT, USAGE]

  defaultPrivileges:
    - objectType: tables
      schema: public
      privileges: [SELECT]

    - objectType: sequences
      schema: public
      privileges: [SELECT, USAGE]
