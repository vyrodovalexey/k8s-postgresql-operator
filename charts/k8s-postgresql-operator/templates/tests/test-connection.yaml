apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "k8s-postgresql-operator.fullname" . }}-test-connection"
  labels:
    {{- include "k8s-postgresql-operator.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: curl
      image: curlimages/curl:8.5.0
      command: ['curl']
      args: ['-k', '-s', '-o', '/dev/null', '-w', '%{http_code}', 'https://{{ .Values.webhook.k8sServiceName }}:{{ .Values.service.port }}/healthz']
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
