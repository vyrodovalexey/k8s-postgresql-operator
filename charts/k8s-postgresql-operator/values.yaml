# Default values for k8s-postgresql-operator
# This is a YAML-formatted file.

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []

# Operator image configuration
image:
  repository: k8s-postgresql-operator
  pullPolicy: IfNotPresent
  tag: "latest"

# Replica count for the operator deployment
replicaCount: 1

# Name override for the operator
nameOverride: ""
fullnameOverride: ""

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

# Resource limits and requests
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity rules
affinity: {}

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}

# Vault configuration
vault:
  addr: "http://0.0.0.0:8200"
  role: "role"
  mountPoint: "secret"
  secretPath: "pdb"

# Vault PKI configuration (optional)
# When enabled, the operator will use Vault PKI to issue webhook TLS certificates
# instead of generating self-signed certificates
vaultPKI:
  # Enable Vault PKI for webhook certificates
  enabled: false
  # Vault PKI secrets engine mount path
  mountPath: "pki"
  # Vault PKI role name for certificate issuance
  role: "webhook-cert"
  # TTL for issued certificates (default: 30 days)
  ttl: "720h"
  # Time before expiry to trigger certificate renewal (default: 24 hours)
  renewalBuffer: "24h"

# Webhook configuration
webhook:
  certPath: ""
  certName: "tls.crt"
  certKey: "tls.key"
  serverPort: 8443
  serverAddr: "0.0.0.0"
  k8sServiceName: "k8s-postgresql-operator-controller-service"
  names:
    postgresql: "k8s-postgresql-operator-validating-webhook-postgresql"
    user: "k8s-postgresql-operator-validating-webhook-user"
    database: "k8s-postgresql-operator-validating-webhook-database"
    grant: "k8s-postgresql-operator-validating-webhook-grant"
    rolegroup: "k8s-postgresql-operator-validating-webhook-rolegroup"
    schema: "k8s-postgresql-operator-validating-webhook-schema"

# Kubernetes paths
k8s:
  tokenPath: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  namespacePath: "/var/run/secrets/kubernetes.io/serviceaccount/namespace"

# Operator configuration
operator:
  enableLeaderElection: true
  probeAddr: ":8081"
  excludeUserList: "postgres"
  postgresqlConnectionRetries: 3
  postgresqlConnectionTimeoutSecs: 10
  vaultAvailabilityRetries: 3
  vaultAvailabilityRetryDelaySecs: 10
  # Vault authentication timeout in seconds
  vaultAuthTimeoutSecs: 30
  # Log level: debug, info, warn, error
  logLevel: "info"
  # Rate limiting for PostgreSQL connections
  postgresqlRateLimitPerSecond: 10
  postgresqlRateLimitBurst: 20
  # Rate limiting for Vault requests
  vaultRateLimitPerSecond: 10
  vaultRateLimitBurst: 20
  # Retry configuration (exponential backoff)
  retry:
    # Initial interval in milliseconds for exponential backoff
    initialIntervalMs: 500
    # Maximum interval in seconds for exponential backoff
    maxIntervalSecs: 30
    # Maximum elapsed time in seconds for all retries
    maxElapsedTimeSecs: 300
    # Multiplier for exponential backoff interval growth
    multiplier: 2.0
    # Randomization factor (jitter) for exponential backoff
    randomizationFactor: 0.5

# Service configuration
service:
  type: ClusterIP
  port: 443
  targetPort: 8443

# RBAC configuration
rbac:
  create: true

# CRDs are automatically installed from the crds/ directory
# They are installed before templates are rendered

# ValidatingWebhookConfiguration
webhooks:
  enabled: true
  failurePolicy: Fail
  sideEffects: None

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  # minAvailable: 1
  # maxUnavailable: 1

# Metrics configuration
metrics:
  # Enable metrics endpoint
  enabled: true
  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    # Enable ServiceMonitor (requires Prometheus Operator)
    enabled: false
    # Namespace for ServiceMonitor (defaults to release namespace)
    namespace: ""
    # Scrape interval
    interval: "30s"
    # Scrape timeout
    scrapeTimeout: "10s"
    # Additional labels for ServiceMonitor
    labels: {}

